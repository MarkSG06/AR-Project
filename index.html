<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Augma AR Navigation</title>
    <!-- Fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --nav-cyan: #00f3ff;
            --nav-cyan-glow: rgba(0, 243, 255, 0.4);
            --bg-glass: rgba(5, 15, 30, 0.6);
            --border-glass: rgba(0, 243, 255, 0.2);
            --alert-red: #ff3366;
            --font-main: 'Share Tech Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: var(--font-main);
            color: #fff;
            background-color: #000;
        }

        /* HUD Overlay */
        #augma-hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass through to AR or map */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .hud-brand {
            font-size: 1.5rem;
            color: var(--nav-cyan);
            text-shadow: 0 0 10px var(--nav-cyan-glow);
            letter-spacing: 2px;
            border-bottom: 2px solid var(--nav-cyan);
            padding-bottom: 5px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
            padding-right: 20px;
        }

        .hud-status {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 5px 15px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--nav-cyan);
            box-shadow: 0 0 15px var(--nav-cyan-glow);
            border-radius: 4px;
        }

        .hud-status.error {
            color: var(--alert-red);
            border-color: var(--alert-red);
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.4);
        }

        .brujula-container {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .brujula {
            width: 100%;
            height: 100%;
            border: 2px solid var(--nav-cyan);
            border-radius: 50%;
            position: relative;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 10px var(--nav-cyan-glow);
            box-sizing: border-box;
            transition: transform 0.1s ease-out;
            cursor: pointer;
        }

        .brujula-arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 14px solid var(--nav-cyan);
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 4px var(--nav-cyan));
            pointer-events: none;
        }


        .brujula-p {
            position: absolute;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 3px rgba(255, 255, 255, 0.5);
        }

        .brujula-p.n {
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--alert-red);
            text-shadow: 0 0 5px red;
            font-size: 12px;
        }

        .brujula-p.s {
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
        }

        .brujula-p.e {
            top: 50%;
            right: 2px;
            transform: translateY(-50%);
        }

        .brujula-p.w {
            top: 50%;
            left: 2px;
            transform: translateY(-50%);
        }

        #hand-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            border: 2px solid var(--nav-cyan);
            background: rgba(0, 243, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            display: none;
            transition: transform 0.1s, background-color 0.1s;
        }

        .hud-main {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
            gap: 20px;
            height: 300px;
        }

        .map-panel {
            position: relative;
            width: 350px;
            height: 250px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #111;
        }

        .map-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .map-overlay h3 {
            color: var(--nav-cyan);
            margin-bottom: 15px;
            font-size: 1.1rem;
            text-shadow: 0 0 5px var(--nav-cyan-glow);
        }

        .cyber-input {
            width: 100%;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--nav-cyan);
            color: #fff;
            padding: 10px;
            font-family: var(--font-main);
            outline: none;
            margin-bottom: 15px;
        }

        .cyber-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .cyber-button {
            background: transparent;
            color: var(--nav-cyan);
            border: 1px solid var(--nav-cyan);
            padding: 10px 20px;
            font-family: var(--font-main);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: inset 0 0 10px rgba(0, 243, 255, 0);
        }

        .cyber-button:hover {
            background: var(--nav-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--nav-cyan-glow);
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px 25px;
            width: 100%;
            max-width: 500px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-item .label {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2px;
        }

        .info-item .value {
            font-size: 1.4rem;
            color: var(--nav-cyan);
            text-shadow: 0 0 8px var(--nav-cyan-glow);
        }

        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .reticle::before,
        .reticle::after {
            content: '';
            position: absolute;
            background: rgba(0, 243, 255, 0.3);
        }

        .reticle::before {
            top: -10px;
            bottom: -10px;
            left: 50%;
            width: 1px;
        }

        .reticle::after {
            left: -10px;
            right: -10px;
            top: 50%;
            height: 1px;
        }

        .reticle-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid var(--nav-cyan);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--nav-cyan-glow);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.3;
            }
        }

        /* A-Frame UI hiding */
        .a-enter-vr {
            display: none !important;
        }

        @media screen and (max-width: 768px) {
            #augma-hud {
                padding: 10px;
            }

            .hud-main {
                flex-direction: row;
                /* Para poner panel y mapa lado a lado */
                justify-content: space-between;
                align-items: flex-end;
                height: auto;
                gap: 10px;
            }

            .map-panel {
                width: 100%;
                height: 160px;
                /* Forzamos tamaño miniatura fijo para no ahogar la pantalla AR */
                flex: none;
                /* Eliminamos el estirado automático */
            }

            .info-panel {
                width: auto;
                min-width: 80px;
                max-width: 100px;
                padding: 15px 5px;
                flex-direction: column;
                justify-content: center;
                gap: 12px;
                align-self: stretch;
                /* Estirar a lo alto si se puede */
            }

            .info-item .value {
                font-size: 0.85rem;
                text-align: center;
            }

            .info-item .label {
                font-size: 0.55rem;
                text-align: center;
            }

            .action-item {
                display: none !important;
            }

            .hud-status {
                font-size: 0.75rem;
                padding: 3px 10px;
            }

            .brujula-container {
                transform: scale(0.85);
                transform-origin: top right;
            }

            .reticle {
                width: 200px;
                height: 200px;
            }
        }
    </style>
    <!-- A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- MediaPipe Hands for Hand Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAO3kcFomugKHhcpS369z_QIEqu30Vw53o&libraries=places"></script>
</head>

<body>

    <!-- AR Scene -->
    <a-scene embedded arjs="sourceType: webcam; facingMode: environment; debugUIEnabled: false; trackingMethod: best;"
        renderer="antialias: true; alpha: true">
        <a-camera id="camera" gps-camera rotation-reader></a-camera>

        <!-- Dynamic AR Directional Arrow -->
        <a-entity id="ar-arrow" geometry="primitive: cone; radiusBottom: 0.3; radiusTop: 0; height: 1.2"
            material="color: #00f3ff; opacity: 0.9; transparent: true; emissive: #00f3ff; emissiveIntensity: 0.5"
            position="0 -0.5 -4" rotation="90 0 0"
            animation="property: position; dir: alternate; dur: 1000; to: 0 0 -4; loop: true" visible="false">
        </a-entity>

        <!-- Dynamic AR Distance Text -->
        <a-entity id="ar-text" text="value: 0m; color: #00f3ff; align: center; width: 4" position="0 -1.5 -4"
            visible="false">
        </a-entity>
    </a-scene>

    <!-- Hand Tracking Elements -->
    <canvas id="output_canvas" style="position:fixed; top:0; left:0; pointer-events:none; z-index:9998;"></canvas>
    <div id="hand-cursor"></div>
    <video id="input_video" style="display:none;"></video>

    <!-- HUD -->
    <div id="augma-hud">
        <div class="hud-header">
            <div class="hud-status" id="system-status">v0.03: STANDBY</div>
            <div class="brujula-container">
                <div class="brujula" id="brujula">
                    <span class="brujula-p n">N</span>
                    <span class="brujula-p s">S</span>
                    <span class="brujula-p e">E</span>
                    <span class="brujula-p w">W</span>
                </div>
                <div class="brujula-arrow"></div>
            </div>
        </div>

        <!-- Reticle -->
        <!-- <div class="reticle">
            <div class="reticle-center"></div>
        </div> -->

        <div class="hud-main">
            <div class="info-panel">
                <div class="info-item">
                    <span class="label">DIST TO TARGET</span>
                    <span class="value" id="ui-distance">-- m</span>
                </div>
                <div class="info-item">
                    <span class="label">ETA</span>
                    <span class="value" id="ui-eta">-- min</span>
                </div>
                <div class="info-item action-item">
                    <span class="label">ACTION</span>
                    <span class="value" id="ui-action">AWAITING</span>
                </div>
            </div>

            <div class="map-panel">
                <div id="map"></div>
                <div id="input-overlay" class="map-overlay">
                    <h3>DESTINATION LINK</h3>
                    <input type="text" id="dest-input" class="cyber-input" placeholder="Enter target location...">
                    <button id="start-nav-btn" class="cyber-button">INITIATE ROUTE</button>
                    <div id="api-warning"
                        style="color: var(--alert-red); font-size: 0.8rem; margin-top: 10px; display: none;">API KEY
                        REQUIRED</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const statusEl = document.getElementById('system-status');
            const destInput = document.getElementById('dest-input');
            const startBtn = document.getElementById('start-nav-btn');
            const overlay = document.getElementById('input-overlay');
            const uiDist = document.getElementById('ui-distance');
            const uiEta = document.getElementById('ui-eta');
            const uiAction = document.getElementById('ui-action');
            const arArrow = document.getElementById('ar-arrow');
            const arText = document.getElementById('ar-text');
            const apiWarning = document.getElementById('api-warning');

            let map, directionsService, directionsRenderer;
            let targetLoc;
            let currentWatchId = null;
            let currentRouteSteps = [];
            let currentStepIndex = 0;
            let customMapPolyline = null; // Línea sólida personalizada para el mapa

            // --- Brujula (Compass) Logic ---
            const brujula = document.getElementById('brujula');
            let lastHeading = 0;

            function handleOrientation(e) {
                let heading;
                if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
                    // iOS
                    heading = e.webkitCompassHeading;
                } else if (e.alpha !== null) {
                    // Android/Chrome: el eje "alpha" crece en sentido contrario a las agujas del reloj
                    // por lo tanto tenemos que restarlo de 360 para obtener un heading "real" (N=0, E=90, S=180, W=270)
                    heading = 360 - e.alpha;
                }

                if (heading !== undefined) {
                    // Evitar salto brusco de 360 a 0
                    let delta = heading - (lastHeading % 360);
                    if (delta > 180) delta -= 360;
                    if (delta < -180) delta += 360;
                    lastHeading += delta;

                    brujula.style.transform = `rotate(${-lastHeading}deg)`;
                    if (typeof map !== 'undefined' && map) map.setHeading(lastHeading);
                }
            }

            if ('ondeviceorientationabsolute' in window) {
                window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }

            // Permiso de orientacion para iOS13+
            brujula.addEventListener('click', () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(response => {
                            if (response == 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation, true);
                            }
                        })
                        .catch(console.error);
                }
            });

            // --- Hand Tracking (MediaPipe) Logic ---
            const videoElement = document.getElementById('input_video');
            const canvasElement = document.getElementById('output_canvas');
            const canvasCtx = canvasElement.getContext('2d');
            const cursorElement = document.getElementById('hand-cursor');
            let isPinching = false;
            let pinchCooldown = false;

            if (typeof Hands !== 'undefined') {
                const hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });

                hands.setOptions({
                    maxNumHands: 2,
                    modelComplexity: 0, // 0 = Perfil "Lite" ultra-rápido para móviles en tiempo real
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                hands.onResults((results) => {
                    const arVideo = document.getElementById('arjs-video') || videoElement; // Hook into AR.js video if available

                    if (arVideo) {
                        // Emparejar EXACTAMENTE la escala del canvas interno y el ancho/alto CSS del overlay de vídeo de AR.js
                        canvasElement.style.width = arVideo.style.width || `${window.innerWidth}px`;
                        canvasElement.style.height = arVideo.style.height || `${window.innerHeight}px`;
                        canvasElement.style.marginLeft = arVideo.style.marginLeft || '0px';
                        canvasElement.style.marginTop = arVideo.style.marginTop || '0px';

                        canvasElement.width = arVideo.videoWidth || window.innerWidth;
                        canvasElement.height = arVideo.videoHeight || window.innerHeight;
                    }

                    canvasCtx.save();
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        // Dibujar las líneas y puntos de la mano
                        if (typeof drawConnectors !== 'undefined' && typeof HAND_CONNECTIONS !== 'undefined') {
                            for (const landmarks of results.multiHandLandmarks) {
                                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: 'rgba(0, 243, 255, 0.8)', lineWidth: 2 });
                                drawLandmarks(canvasCtx, landmarks, { color: 'rgba(255, 51, 102, 0.8)', lineWidth: 1, radius: 2 });
                            }
                        }

                        canvasCtx.restore(); // Restaurar para el proximo frame

                        cursorElement.style.display = 'block';
                        const landmarks = results.multiHandLandmarks[0];
                        const indexTip = landmarks[8];
                        const thumbTip = landmarks[4];

                        // Parsear el estilo real y las resoluciones de AR.js para proyectarlo pixel-perfecto
                        const arVideo = document.getElementById('arjs-video') || videoElement;
                        let vWidth = arVideo ? (parseFloat(arVideo.style.width) || arVideo.videoWidth || window.innerWidth) : window.innerWidth;
                        let vHeight = arVideo ? (parseFloat(arVideo.style.height) || arVideo.videoHeight || window.innerHeight) : window.innerHeight;
                        let mLeft = arVideo ? (parseFloat(arVideo.style.marginLeft) || 0) : 0;
                        let mTop = arVideo ? (parseFloat(arVideo.style.marginTop) || 0) : 0;

                        // Eje X e Y proyectado al monitor midiendo dimensiones del vídeo y crop
                        const cursorX = (indexTip.x * vWidth) + mLeft;
                        const cursorY = (indexTip.y * vHeight) + mTop;

                        cursorElement.style.left = `${cursorX}px`;
                        cursorElement.style.top = `${cursorY}px`;

                        // Calcular distancia entre pulgar e índice
                        const dist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);

                        if (dist < 0.05) { // Gesto de pellizco (Pinch)
                            if (!isPinching && !pinchCooldown) {
                                isPinching = true;
                                cursorElement.style.transform = 'translate(-50%, -50%) scale(0.6)';
                                cursorElement.style.backgroundColor = 'var(--alert-red)';

                                // Simular click en las coordenadas del cursor
                                cursorElement.style.pointerEvents = 'none'; // Evitar clics en el propio cursor
                                const element = document.elementFromPoint(cursorX, cursorY);
                                if (element) {
                                    if (element.tagName === 'INPUT') {
                                        element.focus();
                                    } else if (typeof element.click === 'function') {
                                        element.click();
                                    }
                                }

                                pinchCooldown = true;
                                setTimeout(() => pinchCooldown = false, 500); // Cooldown para no clickear 10 veces por segundo
                            }
                        } else {
                            if (isPinching) {
                                isPinching = false;
                                cursorElement.style.transform = 'translate(-50%, -50%) scale(1)';
                                cursorElement.style.backgroundColor = 'rgba(0, 243, 255, 0.3)';
                            }
                        }
                    } else {
                        canvasCtx.restore();
                        cursorElement.style.display = 'none';
                    }
                });

                // Hookeamos directamente a AR.js para evitar colapso de permisos de cámara en móviles (Webcam Error Name)
                let lastVideoTime = -1;
                async function arjsLoop() {
                    const arVideo = document.getElementById('arjs-video');
                    if (arVideo && !arVideo.paused && arVideo.videoWidth > 0) {
                        // MUY IMPORTANTE: Evitar saturar el procesador gráfico del móvil saltando fotogramas idénticos
                        if (arVideo.currentTime !== lastVideoTime) {
                            lastVideoTime = arVideo.currentTime;
                            try {
                                await hands.send({ image: arVideo });
                            } catch (e) { /* ignore rapid frame fails */ }
                        }
                    }
                    requestAnimationFrame(arjsLoop);
                }
                arjsLoop();
            }

            // Check if Google Maps is loaded
            if (typeof google === 'undefined' || typeof google.maps === 'undefined') {
                statusEl.innerText = 'SYS: MAPS ERR';
                statusEl.classList.add('error');
                apiWarning.style.display = 'block';
                apiWarning.innerText = 'Google Maps API failed to load. Replace YOUR_API_KEY_HERE.';
                return;
            }

            // Init Map
            function initMap() {
                try {
                    directionsService = new google.maps.DirectionsService();
                    directionsRenderer = new google.maps.DirectionsRenderer({
                        suppressPolylines: true, // Forzamos ocultar la línea punteada fea por defecto de "modo caminante"
                        suppressMarkers: false
                    });

                    // Ajustamos el nivel de zoom y la inclinación 3D para que en el panel diminuto del móvil
                    // la línea no se vea aplastada ni grotescamente ancha respecto a la calle.
                    const isMobileMap = window.innerWidth < 768;
                    map = new google.maps.Map(document.getElementById('map'), {
                        zoom: isMobileMap ? 17 : 18,
                        tilt: isMobileMap ? 55 : 67,
                        heading: 0,
                        mapId: 'DEMO_MAP_ID', // Obligatorio para activar el motor WebGL 3D de Google Maps (edificios y perspectiva)
                        center: { lat: 0, lng: 0 },
                        disableDefaultUI: true
                    });

                    directionsRenderer.setMap(map);
                    statusEl.innerText = 'SYS: ONLINE';
                } catch (e) {
                    apiWarning.style.display = 'block';
                    apiWarning.innerText = 'Invalid API Key or Auth Error.';
                }
            }

            initMap();

            // Autocomplete
            const autocomplete = new google.maps.places.Autocomplete(destInput);

            startBtn.addEventListener('click', () => {
                const destination = destInput.value;
                if (!destination) return;

                statusEl.innerText = 'SYS: LOCATING...';

                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const origin = {
                                lat: position.coords.latitude,
                                lng: position.coords.longitude
                            };
                            map.setCenter(origin);
                            calculateRoute(origin, destination);
                        },
                        (error) => {
                            statusEl.innerText = 'SYS: GPS ERROR';
                            statusEl.classList.add('error');
                            console.error(error);
                        },
                        { enableHighAccuracy: true }
                    );
                } else {
                    statusEl.innerText = 'SYS: GPS NOT SUPPORTED';
                    statusEl.classList.add('error');
                }
            });

            function calculateRoute(origin, destination) {
                statusEl.innerText = 'SYS: ROUTING...';

                directionsService.route(
                    {
                        origin: origin,
                        destination: destination,
                        travelMode: google.maps.TravelMode.WALKING
                    },
                    (response, status) => {
                        if (status === 'OK') {
                            directionsRenderer.setDirections(response);

                            // Borrar cualquier línea sólida previa del mapa 2D
                            if (customMapPolyline) customMapPolyline.setMap(null);

                            // Trazado detallado de GPS de la ruta
                            const path = response.routes[0].overview_path;

                            // Dibujamos nuestra propia línea sólida 100% estilo coche (gruesa y contínua) sobre el mapa
                            const isMobileLine = window.innerWidth < 768;
                            customMapPolyline = new google.maps.Polyline({
                                path: path,
                                strokeColor: '#00f3ff',
                                strokeOpacity: 0.9,
                                strokeWeight: isMobileLine ? 4 : 8, // Línea mucho más fina en móvil para no colapsar el mapa
                                map: map
                            });

                            statusEl.innerText = 'SYS: NAVIGATING';
                            overlay.style.opacity = '0';
                            setTimeout(() => overlay.style.display = 'none', 300);

                            const route = response.routes[0].legs[0];
                            currentRouteSteps = route.steps;
                            currentStepIndex = 0;

                            // ---- DIBUJAR LÍNEA (MIGAS DE PAN AR) EN EL MUNDO REAL ----
                            const arScene = document.querySelector('a-scene');
                            // Borrar ruta AR física anterior si la hubiera
                            document.querySelectorAll('.ar-path-node').forEach(el => el.remove());

                            // Transformar los puntos en una "LÍNEA VIRTUAL" de luz sólida superpuesta
                            // Generamos esferas de bajo coste poligonal muy juntas para formar un "tubo holográfico" suave y continuo
                            // que no se parte ni se deforma por culpa de los ejes de rotación cuando la cámara escanea la calle.
                            let renderedMeters = 0;
                            const maxDistRenderer = 800; // Pintar la línea sólo hasta 800 metros de distancia

                            for (let i = 0; i < path.length - 1; i++) {
                                const p1 = path[i];
                                const p2 = path[i + 1];

                                const dist = google.maps.geometry.spherical.computeDistanceBetween(p1, p2);
                                if (dist < 0.5) continue;

                                // Colocar esferas conectadas cada 4 metros (haciéndolas gigantescas)
                                const numSpheres = Math.max(1, Math.floor(dist / 4.0));

                                for (let j = 0; j <= numSpheres; j++) {
                                    const fraction = j / numSpheres;
                                    const point = google.maps.geometry.spherical.interpolate(p1, p2, fraction);

                                    const node = document.createElement('a-entity');
                                    node.setAttribute('gps-entity-place', `latitude: ${point.lat()}; longitude: ${point.lng()};`);

                                    // Esfera AR GIGANTE de casi 7 metros de diámetro (radius: 3.5) para que no parezca un "pixel" en la lejanía real
                                    node.setAttribute('geometry', 'primitive: sphere; radius: 3.5; segments-width: 8; segments-height: 8');

                                    // Al ser muy grande, le bajamos la solidez (opacity: 0.4) para que sea un aura fantasma no cegadora
                                    node.setAttribute('material', 'color: #00f3ff; opacity: 0.4; transparent: true; emissive: #00f3ff; emissiveIntensity: 0.8; side: double');

                                    // Flotando a -1 metro (a media altura, de las piernas a los pies para evitar hundirse bajo tierra físicamente)
                                    node.setAttribute('position', '0 -1.0 0');

                                    node.classList.add('ar-path-node');
                                    arScene.appendChild(node);
                                }

                                renderedMeters += dist;
                                if (renderedMeters > maxDistRenderer) break; // Límite de seguridad de carga WebGL
                            }

                            startTracking(route.end_location);
                        } else {
                            statusEl.innerText = 'SYS: ROUTE ERR';
                            statusEl.classList.add('error');
                        }
                    }
                );
            }

            function startTracking(destinationLatLng) {
                if (currentWatchId) navigator.geolocation.clearWatch(currentWatchId);

                // Show AR elements
                arArrow.setAttribute('visible', 'true');
                arText.setAttribute('visible', 'true');

                currentWatchId = navigator.geolocation.watchPosition(
                    (position) => {
                        updateNavigation(position.coords);
                    },
                    (error) => console.error(error),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            }

            function updateNavigation(coords) {
                const currentLoc = new google.maps.LatLng(coords.latitude, coords.longitude);

                // Centrar dinámicamente el mapa pseudo-3D como un GPS de coche apuntando al coche
                if (map) map.panTo(currentLoc);

                if (currentStepIndex < currentRouteSteps.length) {
                    const step = currentRouteSteps[currentStepIndex];
                    const distToNextStep = google.maps.geometry.spherical.computeDistanceBetween(currentLoc, step.end_location);

                    // Simple logic to advance steps
                    if (distToNextStep < 10) {
                        currentStepIndex++;
                    }

                    if (currentStepIndex < currentRouteSteps.length) {
                        const activeStep = currentRouteSteps[currentStepIndex];

                        // Strip HTML tags for HUD
                        const instruction = activeStep.instructions.replace(/<[^>]*>?/gm, '');

                        uiDist.innerText = activeStep.distance.text;
                        uiEta.innerText = activeStep.duration.text;
                        uiAction.innerText = instruction;

                        arText.setAttribute('text', `value: ${activeStep.distance.text}\n${instruction};`);

                        // Fake Arrow Rotation (Since we lack a reliable compass on standard web without specific permissions)
                        // In a real device, deviceorientation event would compass-align the arrow.
                        // For simulation, we point it forward or slightly left/right based on instructions.
                        if (instruction.toLowerCase().includes('left') || instruction.toLowerCase().includes('izquierda')) {
                            arArrow.setAttribute('rotation', '90 45 0');
                        } else if (instruction.toLowerCase().includes('right') || instruction.toLowerCase().includes('derecha')) {
                            arArrow.setAttribute('rotation', '90 -45 0');
                        } else {
                            arArrow.setAttribute('rotation', '90 0 0');
                        }
                    } else {
                        uiAction.innerText = "DESTIN REA.";
                        arText.setAttribute('text', 'value: DESTINATION REACHED;');
                        arArrow.setAttribute('visible', 'false');
                        statusEl.innerText = 'SYS: ARRIVED';
                    }
                }
            }
        });
    </script>
